version: '3.8'

# ============================================================================
# Docker-Compose Separation Architecture
# ============================================================================
# This configuration separates UatuAudit application from Docker execution
#
# Services:
#   1. uatu         - Main application (no Docker binary)
#   2. docker-dind  - Docker-in-Docker execution engine
#   3. docker-proxy - Security proxy (optional, recommended)
#
# Architecture:
#   uatu → docker-proxy (optional) → docker-dind
# ============================================================================

services:
  # =========================================================================
  # Service 1: UatuAudit Application
  # =========================================================================
  # - Runs the main audit platform
  # - NO Docker daemon or binary inside
  # - Connects to docker-dind service for container execution
  # =========================================================================
  uatu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uatu-app
    ports:
      - "9090:9090"
    volumes:
      # Persistent data storage for audits
      - uatu_data:/root/.uatu
      # Shared socket for docker-proxy communication (if using proxy)
      # - docker-socket:/var/run/docker.sock:ro
    env_file:
      - .env
    environment:
      # Application configuration
      - UATU_PORT=9090
      - UATU_HOME=/root/.uatu
      - UATU_CONCURRENCY=4

      # =====================================================================
      # CRITICAL: Docker connection configuration
      # =====================================================================
      # Point to docker-dind service instead of local socket
      - DOCKER_HOST=tcp://docker-dind:2376

      # TLS Configuration (OPTION 1: No TLS - Development Only)
      - DOCKER_TLS_VERIFY=0

      # TLS Configuration (OPTION 2: With TLS - Production)
      # - DOCKER_TLS_VERIFY=1
      # - DOCKER_CERT_PATH=/certs/client

      # Force Docker usage (now it will work because docker-dind is available)
      - UATU_USE_DOCKER=1
      - UATU_SANDBOX=docker

      # Other configurations from .env
      - UATU_EXECUTE_TIMEOUT_MS=1200000
      - UATU_NODE_HEAP_MB=6144
      - UATU_CLEANUP_SANDBOX=true
      - SKIP_NODE_VERSION_CHECK=true

    # Wait for docker-dind to be ready before starting
    depends_on:
      docker-dind:
        condition: service_healthy

    networks:
      - uatu-network

    restart: unless-stopped

    # Resource limits for UatuAudit application
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # =========================================================================
  # Service 2: Docker-in-Docker (DinD) Execution Engine
  # =========================================================================
  # - Separate Docker daemon for running audit containers
  # - Isolated from host Docker
  # - Manages all test execution containers
  # =========================================================================
  docker-dind:
    image: docker:24-dind
    container_name: uatu-docker
    privileged: true  # Required for DinD to create containers

    environment:
      # =====================================================================
      # TLS Configuration
      # =====================================================================
      # OPTION 1: Disable TLS (Development/Testing)
      # Faster to setup, less secure
      - DOCKER_TLS_CERTDIR=

      # OPTION 2: Enable TLS (Production)
      # More secure, requires certificate setup
      # - DOCKER_TLS_CERTDIR=/certs
      # - DOCKER_TLS_VERIFY=1

      # Performance tuning
      - DOCKER_DRIVER=overlay2

    volumes:
      # Persistent storage for Docker images and containers
      - docker-data:/var/lib/docker

      # TLS certificates (if using OPTION 2)
      # - docker-certs:/certs

    networks:
      - uatu-network

    # Expose Docker API port
    ports:
      - "2376:2376"  # TLS port (or 2375 for non-TLS)

    # Health check to ensure Docker daemon is ready
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    restart: unless-stopped

    # Resource limits for Docker daemon
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # =========================================================================
  # Service 3: Docker Socket Proxy (OPTIONAL - Recommended for Production)
  # =========================================================================
  # - Security layer between UatuAudit and Docker daemon
  # - Fine-grained API access control
  # - Blocks dangerous operations
  # - Provides audit logging
  # =========================================================================
  # docker-proxy:
  #   image: tecnativa/docker-socket-proxy:latest
  #   container_name: uatu-docker-proxy
  #   privileged: true
  #
  #   environment:
  #     # Allow only safe operations
  #     - CONTAINERS=1      # Allow container management
  #     - POST=1            # Allow container creation
  #     - DELETE=1          # Allow container deletion
  #     - BUILD=1           # Allow image building
  #     - COMMIT=0          # Block container commits
  #     - EXEC=0            # Block exec (security risk)
  #     - IMAGES=1          # Allow image operations
  #     - INFO=1            # Allow info/version queries
  #     - NETWORKS=0        # Block network management
  #     - VOLUMES=0         # Block volume management
  #     - SERVICES=0        # Block swarm services
  #     - TASKS=0           # Block swarm tasks
  #     - SECRETS=0         # Block secrets access
  #     - CONFIGS=0         # Block configs access
  #     - LOG_LEVEL=info    # Logging level
  #
  #   volumes:
  #     # Connect to docker-dind instead of host
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #
  #   networks:
  #     - uatu-network
  #
  #   restart: unless-stopped
  #
  #   # If using proxy, change DOCKER_HOST in uatu service to:
  #   # - DOCKER_HOST=tcp://docker-proxy:2375

# ===========================================================================
# Named Volumes
# ===========================================================================
volumes:
  # UatuAudit persistent data (workspace, queue, logs)
  uatu_data:
    name: uatu_data
    driver: local

  # Docker-in-Docker persistent storage (images, containers, volumes)
  docker-data:
    name: uatu_docker_data
    driver: local

  # TLS certificates (if using TLS)
  # docker-certs:
  #   name: uatu_docker_certs
  #   driver: local

  # Shared socket for proxy communication
  # docker-socket:
  #   name: uatu_docker_socket
  #   driver: local

# ===========================================================================
# Networks
# ===========================================================================
networks:
  uatu-network:
    name: uatu_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
