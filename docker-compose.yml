version: '3.8'

services:
  uatu:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    volumes:
      - uatu_data:/root/.uatu
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - UATU_PORT=9090
      - UATU_HOME=/root/.uatu
      - UATU_SANDBOX=docker
      # Add your GitHub OAuth credentials here
      # - GITHUB_CLIENT_ID=your_client_id
      # - GITHUB_CLIENT_SECRET=your_client_secret
      # - GITHUB_OAUTH_CALLBACK=http://localhost:9090/auth/github/callback
      # Optional: Add Anthropic API key for AI features
      # - ANTHROPIC_API_KEY=your_key
    restart: unless-stopped
    # Optional: Add resource limits
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 2G

volumes:
  uatu_data:
    name: uatu_data
