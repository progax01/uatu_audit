version: '3.8'

services:
  uatu:
    build:
      context: .
      args:
        - NODE_ENV=development
    environment:
      - NODE_ENV=development
    command: ["pnpm", "run", "dev"]
    volumes:
      - .:/app
      - /app/node_modules
    # Enable debugging port
    ports:
      - "9229:9229"
